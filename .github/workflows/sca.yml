# Software Composition Analysis (SCA) Workflow
#
# Purpose:
#   Performs automated security composition analysis to identify vulnerabilities
#   in project dependencies and container images.
#
# Triggers:
#   - schedule: Daily at midnight (00:00 UTC)
#   - pull_request: When PRs target the any branch
#   - workflow_dispatch: Manual workflow execution
#   - branch_protection_rule: When branch protection rules are modified
#
# Permissions:
#   - contents: write - Required for updating dependency graphs
#   - pull-requests: write - Required for creating dependency review comments
#   - issues: write - Required for creating security advisories
#   - security-events: write - Required for uploading security scan results
#   - actions: read - Required for reading workflow run data
#
# Jobs:
#   setup:
#     - Prepares the infrastructure and environment configuration
#     - Outputs: environment name and timezone for downstream jobs
#
#   sca:
#     - Checks out the repository code
#     - Configures Node.js environment
#     - Installs project dependencies
#     - Executes SCA scan with dependency review and container image scanning
#
# Configuration:
#   - Environment: base (configurable via env vars)
#   - Timezone: Configurable via repository variables (TIMEZONE)
#   - Dependency review config: .github/dependency-review-config.yml
#   - Docker images config: sources.json
#
# Required Variables:
#   - TIMEZONE: Repository variable defining the timezone for operations
#   - NODE_VERSION: Node.js version for the runtime environment

name: SCA ⚡️
run-name: Software Composition Analysis ⚡️
concurrency:
  group: sca-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 0 * * *"

  pull_request:
    branches:
      - "**" # All branches

  workflow_dispatch:
  branch_protection_rule:

permissions: {}

env:
  environment: base
  timezone: ${{ vars.TIMEZONE }}
  sca_mandatory_owasp: ${{ vars.SCA_MANDATORY_OWASP || 'true' }}
  sca_mandatory_sbom: ${{ vars.SCA_MANDATORY_SBOM || 'false' }}

jobs:
  setup:
    name: Infrastructure 🔧
    runs-on: ["ubuntu-latest"]
    outputs:
      environment: ${{ env.environment }}
      timezone: ${{ env.timezone }}
    steps:
      - name: Environment 🧪
        run: echo "Environment set to ${{ env.environment }}"

      - name: Timezone 🌐
        run: echo "Timezone set to ${{ env.timezone }}"
  sca:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      actions: read

    name: Execute ⚙️
    runs-on: ["ubuntu-latest"]
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scope
        id: scope
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCA_MANDATORY_OWASP: ${{ env.sca_mandatory_owasp }}
          SCA_MANDATORY_SBOM: ${{ env.sca_mandatory_sbom }}
        run: |
          set -euo pipefail
          dependency_related=true
          docker_sources_changed=true

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dependency_related=false
            docker_sources_changed=false
            api_url="${{ github.api_url }}/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100"
            dependency_pattern='(^|/)(package\.json|package-lock\.json|npm-shrinkwrap\.json|pnpm-lock\.yaml|yarn\.lock|requirements(\-.*)?\.txt|Pipfile|Pipfile\.lock|pyproject\.toml|poetry\.lock|pom\.xml|build\.gradle(\.kts)?|settings\.gradle(\.kts)?|gradle/libs\.versions\.toml|go\.mod|go\.sum|Cargo\.toml|Cargo\.lock|Gemfile|Gemfile\.lock|composer\.json|composer\.lock|paket\.dependencies|paket\.lock|Directory\.Packages\.props|[^/]+\.(csproj|fsproj|vbproj)|dependency-check-suppression\.xml)$'
            docker_pattern='(^|/)sources\.json$'

            while [ -n "${api_url}" ]; do
              headers_file="$(mktemp)"
              body_file="$(mktemp)"

              curl -sS -L \
                -D "${headers_file}" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${api_url}" > "${body_file}"

              files="$(jq -r 'if type=="array" then .[]?.filename else empty end' "${body_file}")"

              if echo "${files}" | grep -Eq "${dependency_pattern}"; then
                dependency_related=true
              fi

              if echo "${files}" | grep -Eq "${docker_pattern}"; then
                docker_sources_changed=true
              fi

              api_url="$(sed -n 's/^link:.*<\([^>]*\)>; rel="next".*/\1/pI' "${headers_file}")"
            done
          fi

          run_owasp="${dependency_related}"
          if [ "${SCA_MANDATORY_OWASP}" = "true" ]; then
            run_owasp=true
          fi

          run_sbom=false
          if [ "${dependency_related}" = "true" ] || [ "${docker_sources_changed}" = "true" ]; then
            run_sbom=true
          fi
          if [ "${SCA_MANDATORY_SBOM}" = "true" ]; then
            run_sbom=true
          fi

          echo "dependency_related=${dependency_related}" >> "${GITHUB_OUTPUT}"
          echo "docker_sources_changed=${docker_sources_changed}" >> "${GITHUB_OUTPUT}"
          echo "run_owasp=${run_owasp}" >> "${GITHUB_OUTPUT}"
          echo "run_sbom=${run_sbom}" >> "${GITHUB_OUTPUT}"

      - name: ⚡️ SCA
        uses: ./sca
        with:
          token: "${{ secrets.GITHUB_TOKEN }}" # Mandatory
          checkout: "false"
          dependency-review-config-file: "./.github/dependency-review-config.yml" # Optional
          docker-images-file: "${{ github.workspace }}/sources.json" # Optional
          dependency-check-suppression-file: "dependency-check-suppression.xml" # Optional
          run-owasp: ${{ steps.scope.outputs.run_owasp }}
          run-sbom: ${{ steps.scope.outputs.run_sbom }}
